name: Quality Checks

on:
  push:
    branches: [main, chore/release-please]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          npm install -g @lhci/cli@0.13.0
        continue-on-error: true

      - name: Build project
        run: |
          if [ -f "package.json" ]; then
            npm run build --if-present || echo "No build script found"
          fi
        continue-on-error: true

      - name: Run Lighthouse CI
        run: |
          # Create lighthouse config if it doesn't exist
          if [ ! -f "lighthouserc.json" ]; then
            cat > lighthouserc.json << 'EOF'
          {
            "ci": {
              "collect": {
                "staticDistDir": "./",
                "numberOfRuns": 3
              },
              "assert": {
                "assertions": {
                  "categories:performance": ["warn", {"minScore": 0.7}],
                  "categories:accessibility": ["warn", {"minScore": 0.8}],
                  "categories:best-practices": ["warn", {"minScore": 0.8}],
                  "categories:seo": ["warn", {"minScore": 0.8}]
                }
              },
              "upload": {
                "target": "temporary-public-storage"
              }
            }
          }
          EOF
          fi

          # Run Lighthouse CI
          lhci autorun || {
            echo "::warning::Lighthouse CI failed but continuing workflow"
            exit 0
          }
        continue-on-error: true

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30
        continue-on-error: true

  readability:
    name: Code Readability & Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts
        continue-on-error: true

      - name: Check TypeScript compilation
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit || {
              echo "::warning::TypeScript compilation has errors"
              exit 0
            }
          else
            echo "No tsconfig.json found, skipping TypeScript check"
          fi
        continue-on-error: true

      - name: Run ESLint
        run: |
          if [ -f ".eslintrc.json" ] || [ -f ".eslintrc.js" ] || [ -f "eslint.config.js" ]; then
            npx eslint . --ext .js,.ts,.jsx,.tsx --max-warnings 50 || {
              echo "::warning::ESLint found issues"
              exit 0
            }
          else
            echo "No ESLint config found, skipping lint check"
          fi
        continue-on-error: true

      - name: Check code complexity
        run: |
          npm install -g complexity-report

          # Find and analyze JavaScript/TypeScript files
          find . -type f \( -name "*.js" -o -name "*.ts" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/dist/*" \
            -not -path "*/build/*" \
            -not -path "*/.next/*" | head -20 | while read file; do
            echo "Analyzing: $file"
            cr "$file" --format json || true
          done || echo "Complexity analysis completed"
        continue-on-error: true

      - name: Generate code metrics
        run: |
          echo "## Code Metrics Report" > code-metrics.md
          echo "" >> code-metrics.md
          echo "### File Statistics" >> code-metrics.md
          echo "" >> code-metrics.md

          # Count files by type
          echo "**TypeScript files**: $(find . -name '*.ts' -not -path '*/node_modules/*' | wc -l)" >> code-metrics.md
          echo "**JavaScript files**: $(find . -name '*.js' -not -path '*/node_modules/*' | wc -l)" >> code-metrics.md
          echo "**Test files**: $(find . -name '*.test.*' -o -name '*.spec.*' | wc -l)" >> code-metrics.md
          echo "" >> code-metrics.md

          # Lines of code
          echo "### Lines of Code" >> code-metrics.md
          echo "" >> code-metrics.md
          echo '```' >> code-metrics.md
          find . -type f \( -name "*.ts" -o -name "*.js" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/dist/*" \
            -not -path "*/build/*" | \
            xargs wc -l | tail -1 >> code-metrics.md
          echo '```' >> code-metrics.md

          cat code-metrics.md
        continue-on-error: true

      - name: Upload code metrics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-metrics
          path: code-metrics.md
          retention-days: 30
        continue-on-error: true

  accessibility:
    name: Accessibility Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install axe-core
        run: npm install -g @axe-core/cli

      - name: Run accessibility tests on HTML files
        run: |
          # Find HTML files and test them
          find . -name "*.html" \
            -not -path "*/node_modules/*" \
            -not -path "*/dist/*" \
            -not -path "*/build/*" | head -10 | while read file; do
            echo "Testing: $file"
            axe "$file" --exit || echo "::warning::Accessibility issues found in $file"
          done
        continue-on-error: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate || {
            echo "::warning::Security vulnerabilities found"
            exit 0
          }
        continue-on-error: true

      - name: Check for secrets
        run: |
          # Simple grep for common secret patterns
          echo "Checking for potential secrets..."

          # Check for API keys, tokens, passwords
          if grep -r -i -E "(api[_-]?key|secret|password|token|auth)" \
            --include="*.js" \
            --include="*.ts" \
            --include="*.env.example" \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            . | grep -v "TODO" | grep -v "EXAMPLE" | head -20; then
            echo "::warning::Potential secrets found in code (review above)"
          else
            echo "No obvious secrets detected"
          fi
        continue-on-error: true

  summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [lighthouse, readability, accessibility, security]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Quality Checks Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All quality checks completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check individual job results for details:" >> $GITHUB_STEP_SUMMARY
          echo "- Lighthouse Performance" >> $GITHUB_STEP_SUMMARY
          echo "- Code Readability" >> $GITHUB_STEP_SUMMARY
          echo "- Accessibility Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Security Audit" >> $GITHUB_STEP_SUMMARY
